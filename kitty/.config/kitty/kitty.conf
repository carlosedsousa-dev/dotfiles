# Fontes
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        10

# Janela e Transparência
background_opacity         0.60
dynamic_background_opacity yes
window_padding_width       16
confirm_os_window_close    0

# Cursor
cursor_shape               beam
cursor_blink_interval      0.5

# Shell
shell zsh

# Importa o arquivo de cores (O caminho pode ser relativo ou absoluto)
include colors.conf